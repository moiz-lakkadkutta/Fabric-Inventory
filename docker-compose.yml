services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fabric}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fabric_dev}
      POSTGRES_DB: ${POSTGRES_DB:-fabric_erp}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    # DOS-07: cap Redis memory and evict least-recently-used *TTL-bearing* keys
    # when the limit is approached. volatile-lru (not allkeys-lru) is used so
    # idempotency keys that carry a 24h TTL can be evicted under OOM pressure
    # while non-expiring keys (e.g. Lua scripts) are never silently dropped —
    # preventing a retried mutating request from re-executing due to eviction.
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy volatile-lru
    mem_limit: 160m
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      # TASK-004's baseline migration loads `schema/ddl.sql` by walking
      # up to `Path(__file__).parents[3]`, which resolves to `/schema/`
      # inside the container. Without this mount, `alembic upgrade head`
      # blows up on the very first migration. The hosted runtime (CI
      # docker-compose + any future prod-compose target) needs the mount
      # because TASK-005 deferred bundling the SQL into the image.
      - ./schema:/schema:ro
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Runtime DB connection: fabric_app (NOBYPASSRLS) so RLS is enforced
      # at runtime (per TASK-INT-16). The role is created by the INT-9
      # migration; alembic still runs under the superuser at boot.
      DATABASE_URL: postgresql+asyncpg://${APP_DB_USER:-fabric_app}:${APP_DB_PASSWORD:-fabric_app_dev}@postgres:5432/${POSTGRES_DB:-fabric_erp}
      MIGRATION_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-fabric}:${POSTGRES_PASSWORD:-fabric_dev}@postgres:5432/${POSTGRES_DB:-fabric_erp}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # `/ready` checks DB + Redis; `/live` is the cheap liveness probe.
      # We use `/ready` so compose only flips to "healthy" once the app
      # can actually serve requests (alembic finished + DB reachable).
      test:
        - CMD-SHELL
        - "python -c 'import urllib.request,sys; urllib.request.urlopen(\"http://localhost:8000/ready\",timeout=2); sys.exit(0)' || exit 1"
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      # CUT-001 wired the FE through a same-origin Vite proxy at /api.
      # `VITE_API_BASE_URL=/api` makes the browser hit /api/* on the
      # Vite dev server; `VITE_API_TARGET=http://api:8000` makes Vite
      # forward those calls to the FastAPI container over the compose
      # network. `VITE_API_MODE=live` flips every TanStack Query hook
      # off the click-dummy and onto the live backend — required for
      # the CUT-503 acceptance Playwright suite.
      VITE_API_BASE_URL: /api
      VITE_API_TARGET: http://api:8000
      VITE_API_MODE: live
    depends_on:
      api:
        condition: service_started
    healthcheck:
      # Vite dev server returns 200 for the SPA shell on `/`. The
      # `wget -q --spider` form returns rc=0 on a 2xx response and
      # rc!=0 otherwise — perfect for compose healthcheck.
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5173/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

volumes:
  pgdata:
