<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Taana — Brand & Design System Canvas</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="tokens.css" />

<style>
  @keyframes taanaShimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  /* Stage: hold the canvas centred with subtle frame around it */
  .stage {
    min-height: 100vh;
    background: var(--bg-sunken);
    padding: 32px 16px 96px;
    display: flex;
    justify-content: center;
  }
  /* Reset that doesn't need :focus-visible on input we render readOnly */
  input[readonly] { caret-color: transparent; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="canvas.jsx"></script>

  <script type="text/babel">
    const { useState } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "device": "desktop"
    }/*EDITMODE-END*/;

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      return (
        <div className="stage">
          <Canvas device={t.device} />
          <TweaksPanel>
            <TweakSection label="Frame" />
            <TweakRadio
              label="Device"
              value={t.device}
              options={[
                { value: 'desktop', label: '1440' },
                { value: 'tablet',  label: '1024' },
                { value: 'mobile',  label: '390'  },
              ]}
              onChange={(v) => setTweak('device', v)}
            />
          </TweaksPanel>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
