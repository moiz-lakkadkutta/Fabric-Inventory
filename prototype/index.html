<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fabric & Ladies-Suit ERP — Interactive Prototype</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .sidebar-nav { transition: all 300ms ease; }
    .sidebar-nav.collapsed { transform: translateX(-100%); }
    .currency { font-variant-numeric: tabular-nums; }
    .fade-in { animation: fadeIn 200ms ease-in; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .sparkline { display: inline-block; height: 24px; }
    table { border-collapse: collapse; }
    input[type="number"] { font-variant-numeric: tabular-nums; }
  </style>
</head>
<body class="bg-slate-50" x-cloak x-data="appState()">
  <!-- Top Navigation Bar -->
  <nav class="sticky top-0 z-40 bg-white border-b border-slate-200 shadow-sm">
    <div class="flex items-center justify-between px-4 py-3">
      <div class="flex items-center gap-3">
        <button @click="sidebarOpen = !sidebarOpen" class="p-2 hover:bg-slate-100 rounded-lg focus-visible:ring-2 focus-visible:ring-blue-600 focus-visible:ring-offset-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
        <h1 class="text-lg font-semibold text-slate-900">Fabric & Ladies-Suit ERP</h1>
      </div>
      <div class="flex items-center gap-4">
        <!-- Firm Switcher -->
        <div class="relative" x-data="{ open: false }">
          <button @click="open = !open" class="flex items-center gap-2 px-3 py-2 text-sm bg-slate-100 hover:bg-slate-200 rounded-lg focus-visible:ring-2 focus-visible:ring-blue-600 focus-visible:ring-offset-2">
            <i data-lucide="building-2" class="w-4 h-4"></i>
            <span x-text="currentFirm.name"></span>
            <i data-lucide="chevron-down" class="w-4 h-4"></i>
          </button>
          <div x-show="open" @click.outside="open = false" class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg border border-slate-200 py-1 z-50">
            <template x-for="firm in firms" :key="firm.id">
              <button @click="currentFirm = firm; open = false" class="w-full text-left px-4 py-2 hover:bg-slate-100 text-sm" :class="{ 'bg-blue-50 text-blue-700': currentFirm.id === firm.id }">
                <span x-text="firm.name"></span>
                <span x-show="firm.gstin" class="text-xs text-slate-500" x-text="' (' + firm.gstin + ')'"></span>
              </button>
            </template>
          </div>
        </div>
        <!-- Quick Add Menu -->
        <div class="relative" x-data="{ open: false }">
          <button @click="open = !open" class="flex items-center gap-2 px-2 py-2 text-sm bg-emerald-600 text-white hover:bg-emerald-700 rounded-lg focus-visible:ring-2 focus-visible:ring-emerald-400 focus-visible:ring-offset-2">
            <i data-lucide="plus" class="w-5 h-5"></i>
          </button>
          <div x-show="open" @click.outside="open = false" class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg border border-slate-200 py-1 z-50">
            <button @click="openNewPartyModal('both'); open = false" class="w-full text-left px-4 py-2 hover:bg-slate-100 text-sm flex items-center gap-2">
              <i data-lucide="plus" class="w-4 h-4"></i> Add Party
            </button>
            <button @click="openNewItemModal(); open = false" class="w-full text-left px-4 py-2 hover:bg-slate-100 text-sm flex items-center gap-2">
              <i data-lucide="plus" class="w-4 h-4"></i> Add Item
            </button>
            <hr class="my-1">
            <button @click="currentScreen = 'sales'; open = false" class="w-full text-left px-4 py-2 hover:bg-slate-100 text-sm flex items-center gap-2">
              <i data-lucide="plus" class="w-4 h-4"></i> New Invoice
            </button>
            <button @click="currentScreen = 'purchases'; open = false" class="w-full text-left px-4 py-2 hover:bg-slate-100 text-sm flex items-center gap-2">
              <i data-lucide="plus" class="w-4 h-4"></i> New PO
            </button>
          </div>
        </div>
        <!-- Notifications -->
        <button class="relative p-2 hover:bg-slate-100 rounded-lg focus-visible:ring-2 focus-visible:ring-blue-600 focus-visible:ring-offset-2">
          <i data-lucide="bell" class="w-5 h-5"></i>
          <span class="absolute top-1 right-1 w-2 h-2 bg-red-600 rounded-full"></span>
        </button>
        <!-- User Menu -->
        <div class="relative" x-data="{ open: false }">
          <button @click="open = !open" class="flex items-center gap-2 px-3 py-2 text-sm hover:bg-slate-100 rounded-lg focus-visible:ring-2 focus-visible:ring-blue-600 focus-visible:ring-offset-2">
            <i data-lucide="user" class="w-4 h-4"></i>
            <span>Raj K.</span>
          </button>
          <div x-show="open" @click.outside="open = false" class="absolute right-0 mt-2 w-40 bg-white rounded-lg shadow-lg border border-slate-200 py-1 z-50">
            <a href="#" class="block px-4 py-2 text-sm hover:bg-slate-100">Profile</a>
            <a href="#" class="block px-4 py-2 text-sm hover:bg-slate-100">Settings</a>
            <hr class="my-1">
            <a href="#" class="block px-4 py-2 text-sm hover:bg-slate-100 text-red-600">Logout</a>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <div class="flex h-screen overflow-hidden bg-slate-50">
    <!-- Sidebar Navigation -->
    <aside class="fixed md:relative sidebar-nav" :class="{ 'collapsed': !sidebarOpen }" style="width: 220px; left: 0; top: 60px; height: calc(100vh - 60px); z-index: 30; background: white; border-right: 1px solid #e2e8f0; overflow-y: auto;">
      <nav class="p-4 space-y-2">
        <template x-for="item in navItems" :key="item.id">
          <button @click="currentScreen = item.id; sidebarOpen = false" class="w-full flex items-center gap-3 px-3 py-2.5 text-sm rounded-lg transition-colors" :class="{ 'bg-blue-600 text-white': currentScreen === item.id, 'text-slate-700 hover:bg-slate-100': currentScreen !== item.id }">
            <i class="w-5 h-5" :data-lucide="item.icon"></i>
            <span x-text="item.label"></span>
          </button>
        </template>
      </nav>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 overflow-auto">
      <div class="transition-all fade-in">
        <!-- DASHBOARD SCREEN -->
        <template x-if="currentScreen === 'dashboard'">
          <div class="p-6 space-y-6">
            <div class="flex items-center justify-between">
              <h2 class="text-2xl font-semibold text-slate-900">Dashboard</h2>
              <button @click="refreshDashboard()" class="flex items-center gap-2 px-3 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 focus-visible:ring-2 focus-visible:ring-blue-600 focus-visible:ring-offset-2 text-sm">
                <i data-lucide="refresh-cw" class="w-4 h-4"></i> Refresh
              </button>
            </div>

            <!-- KPI Cards -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
              <!-- Today's Sales -->
              <div class="bg-white rounded-lg border border-slate-200 p-4 shadow-sm hover:shadow-md transition">
                <div class="flex items-center justify-between mb-2">
                  <span class="text-sm text-slate-600">Today's Sales</span>
                  <i data-lucide="trending-up" class="w-5 h-5 text-emerald-600"></i>
                </div>
                <div class="text-2xl font-semibold text-slate-900 currency">₹5,42,300</div>
                <div class="text-xs text-slate-500 mt-1">+12% vs yesterday</div>
                <svg class="sparkline mt-3 w-full" viewBox="0 0 100 24" xmlns="http://www.w3.org/2000/svg">
                  <polyline points="0,18 12,14 24,16 36,8 48,12 60,6 72,10 84,4 96,8" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
                </svg>
              </div>

              <!-- Collections -->
              <div class="bg-white rounded-lg border border-slate-200 p-4 shadow-sm hover:shadow-md transition">
                <div class="flex items-center justify-between mb-2">
                  <span class="text-sm text-slate-600">Collections Today</span>
                  <i data-lucide="credit-card" class="w-5 h-5 text-blue-600"></i>
                </div>
                <div class="text-2xl font-semibold text-slate-900 currency">₹2,18,500</div>
                <div class="text-xs text-slate-500 mt-1">3 receipts</div>
              </div>

              <!-- Cash Position -->
              <div class="bg-white rounded-lg border border-slate-200 p-4 shadow-sm hover:shadow-md transition">
                <div class="flex items-center justify-between mb-2">
                  <span class="text-sm text-slate-600">Cash Balance</span>
                  <i data-lucide="wallet" class="w-5 h-5 text-amber-600"></i>
                </div>
                <div class="text-2xl font-semibold text-slate-900 currency">₹8,76,200</div>
                <div class="text-xs text-emerald-600 mt-1">+5.2% this week</div>
              </div>

              <!-- WIP Value -->
              <div class="bg-white rounded-lg border border-slate-200 p-4 shadow-sm hover:shadow-md transition">
                <div class="flex items-center justify-between mb-2">
                  <span class="text-sm text-slate-600">WIP Value</span>
                  <i data-lucide="package" class="w-5 h-5 text-purple-600"></i>
                </div>
                <div class="text-2xl font-semibold text-slate-900 currency">₹32,14,600</div>
                <div class="text-xs text-slate-500 mt-1">128 active jobs</div>
              </div>

              <!-- Production Status -->
              <div class="bg-white rounded-lg border border-slate-200 p-4 shadow-sm hover:shadow-md transition cursor-pointer" @click="currentScreen = 'production'">
                <div class="flex items-center justify-between mb-2">
                  <span class="text-sm text-slate-600">Production</span>
                  <i data-lucide="factory" class="w-5 h-5 text-blue-600"></i>
                </div>
                <div class="text-sm font-semibold text-slate-900">3 MOs in progress</div>
                <div class="text-xs text-slate-500 mt-1 currency">₹<span x-text="formatNumber(getTotalKanbanValue())"></span> at job-workers · 2 overdue</div>
              </div>

              <!-- Overdue Receivables -->
              <div class="bg-white rounded-lg border border-slate-200 p-4 shadow-sm hover:shadow-md transition">
                <div class="flex items-center justify-between mb-2">
                  <span class="text-sm text-slate-600">Overdue > 60 days</span>
                  <i data-lucide="alert-circle" class="w-5 h-5 text-red-600"></i>
                </div>
                <div class="text-2xl font-semibold text-slate-900 currency">₹4,23,000</div>
                <div class="text-xs text-red-600 mt-1">8 customers</div>
              </div>

              <!-- GSTR Due -->
              <div class="bg-white rounded-lg border border-slate-200 p-4 shadow-sm hover:shadow-md transition">
                <div class="flex items-center justify-between mb-2">
                  <span class="text-sm text-slate-600">Next GSTR Due</span>
                  <i data-lucide="calendar" class="w-5 h-5 text-slate-600"></i>
                </div>
                <div class="text-2xl font-semibold text-slate-900">May 11</div>
                <div class="text-xs text-amber-600 mt-1">GSTR-1 (B2B)</div>
              </div>
            </div>

            <!-- Bottom Row: Tables -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
              <!-- Top Customers -->
              <div class="bg-white rounded-lg border border-slate-200 shadow-sm">
                <div class="border-b border-slate-200 px-4 py-3">
                  <h3 class="font-semibold text-slate-900 text-sm">Top Customers (This Month)</h3>
                </div>
                <table class="w-full text-sm">
                  <thead class="bg-slate-50 border-b border-slate-200">
                    <tr><th class="px-4 py-2 text-left font-medium text-slate-600">Name</th><th class="px-4 py-2 text-right font-medium text-slate-600">Amount</th></tr>
                  </thead>
                  <tbody>
                    <tr class="border-b border-slate-100 hover:bg-slate-50"><td class="px-4 py-2">Surat Silk Mills</td><td class="px-4 py-2 text-right currency">₹2,34,500</td></tr>
                    <tr class="border-b border-slate-100 hover:bg-slate-50"><td class="px-4 py-2">Rajesh Textiles</td><td class="px-4 py-2 text-right currency">₹1,89,200</td></tr>
                    <tr class="border-b border-slate-100 hover:bg-slate-50"><td class="px-4 py-2">Krishna Fabrics</td><td class="px-4 py-2 text-right currency">₹1,56,800</td></tr>
                    <tr class="hover:bg-slate-50"><td class="px-4 py-2">Sharma Exports</td><td class="px-4 py-2 text-right currency">₹98,400</td></tr>
                  </tbody>
                </table>
              </div>

              <!-- Recent Invoices -->
              <div class="bg-white rounded-lg border border-slate-200 shadow-sm">
                <div class="border-b border-slate-200 px-4 py-3">
                  <h3 class="font-semibold text-slate-900 text-sm">Recent Invoices</h3>
                </div>
                <table class="w-full text-sm">
                  <thead class="bg-slate-50 border-b border-slate-200">
                    <tr><th class="px-4 py-2 text-left font-medium text-slate-600">Invoice</th><th class="px-4 py-2 text-left font-medium text-slate-600">Date</th><th class="px-4 py-2 text-right font-medium text-slate-600">Amount</th></tr>
                  </thead>
                  <tbody>
                    <tr class="border-b border-slate-100 hover:bg-slate-50"><td class="px-4 py-2">INV-2404-0032</td><td class="px-4 py-2 text-slate-600">23-Apr</td><td class="px-4 py-2 text-right currency">₹85,400</td></tr>
                    <tr class="border-b border-slate-100 hover:bg-slate-50"><td class="px-4 py-2">INV-2404-0031</td><td class="px-4 py-2 text-slate-600">23-Apr</td><td class="px-4 py-2 text-right currency">₹1,23,600</td></tr>
                    <tr class="border-b border-slate-100 hover:bg-slate-50"><td class="px-4 py-2">INV-2404-0030</td><td class="px-4 py-2 text-slate-600">22-Apr</td><td class="px-4 py-2 text-right currency">₹54,200</td></tr>
                    <tr class="hover:bg-slate-50"><td class="px-4 py-2">INV-2404-0029</td><td class="px-4 py-2 text-slate-600">22-Apr</td><td class="px-4 py-2 text-right currency">₹76,800</td></tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </template>

        <!-- SALES INVOICE QUICK ENTRY SCREEN -->
        <template x-if="currentScreen === 'sales'">
          <div class="p-6 space-y-6">
            <div class="flex items-center justify-between">
              <h2 class="text-2xl font-semibold text-slate-900">Sales Invoice — Quick Entry</h2>
              <div class="flex gap-2">
                <button @click="resetInvoiceForm()" class="flex items-center gap-2 px-3 py-2 text-slate-700 bg-slate-100 hover:bg-slate-200 rounded-lg focus-visible:ring-2 focus-visible:ring-blue-600 focus-visible:ring-offset-2 text-sm">
                  <i data-lucide="plus" class="w-4 h-4"></i> New
                </button>
              </div>
            </div>

            <!-- Credit Limit Meter -->
            <div class="bg-white rounded-lg border border-slate-200 p-4 shadow-sm" x-show="invoiceForm.customerId">
              <div class="flex items-center justify-between mb-2">
                <span class="text-sm font-medium text-slate-900" x-text="'Credit Limit: ' + (invoiceForm.customerId ? customers.find(c => c.id === invoiceForm.customerId).creditLimit : '—')"></span>
                <span class="text-sm text-slate-600" x-text="'Outstanding: ' + (invoiceForm.customerId ? '₹' + formatNumber(customers.find(c => c.id === invoiceForm.customerId).outstanding) : '—')"></span>
              </div>
              <div class="w-full bg-slate-200 rounded-full h-2">
                <div class="bg-emerald-600 h-2 rounded-full" style="width: 65%"></div>
              </div>
              <div class="text-xs text-slate-500 mt-1">65% utilised</div>
            </div>

            <!-- Invoice Entry Form -->
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Customer</label>
                <div class="relative" x-data="{ pickerOpen: false }">
                  <button @click="pickerOpen = !pickerOpen" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus-visible:ring-2 focus-visible:ring-blue-600 focus-visible:ring-offset-2 text-sm text-left bg-white hover:bg-slate-50 flex items-center justify-between">
                    <span x-text="invoiceForm.customerId ? customers.find(c => c.id === invoiceForm.customerId)?.name : 'Select Customer...'"></span>
                    <i data-lucide="chevron-down" class="w-4 h-4 text-slate-500"></i>
                  </button>
                  <div x-show="pickerOpen" @click.outside="pickerOpen = false" class="absolute top-full left-0 right-0 mt-1 bg-white rounded-lg shadow-lg border border-slate-200 z-40 max-h-64 overflow-y-auto">
                    <template x-for="cust in customers" :key="cust.id">
                      <button @click="invoiceForm.customerId = cust.id; pickerOpen = false" class="w-full text-left px-4 py-2 hover:bg-slate-100 text-sm border-b border-slate-100 last:border-b-0">
                        <div x-text="cust.name" class="font-medium"></div>
                        <div x-text="cust.city" class="text-xs text-slate-500"></div>
                      </button>
                    </template>
                    <button @click="openNewPartyModal('customer'); pickerOpen = false" class="w-full text-left px-4 py-2 text-emerald-600 hover:bg-emerald-50 text-sm border-t border-slate-200 flex items-center gap-2 font-medium">
                      <i data-lucide="plus" class="w-4 h-4"></i> Add new party
                    </button>
                  </div>
                </div>
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Date</label>
                <input type="date" x-model="invoiceForm.date" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus-visible:ring-2 focus-visible:ring-blue-600 focus-visible:ring-offset-2 text-sm">
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Invoice #</label>
                <input type="text" x-model="invoiceForm.invoiceNumber" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus-visible:ring-2 focus-visible:ring-blue-600 focus-visible:ring-offset-2 text-sm" placeholder="Auto">
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Payment Mode</label>
                <select x-model="invoiceForm.paymentMode" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus-visible:ring-2 focus-visible:ring-blue-600 focus-visible:ring-offset-2 text-sm">
                  <option value="cash">Cash</option>
                  <option value="upi">UPI</option>
                  <option value="bank">Bank Transfer</option>
                  <option value="cheque">Cheque</option>
                  <option value="credit">Credit (Terms)</option>
                </select>
              </div>
            </div>

            <!-- Line Items Table -->
            <div class="bg-white rounded-lg border border-slate-200 shadow-sm overflow-hidden">
              <div class="border-b border-slate-200 px-4 py-3 bg-slate-50 flex items-center justify-between">
                <h3 class="font-semibold text-slate-900 text-sm">Line Items</h3>
                <div class="flex gap-2">
                  <button @click="openNewItemModal()" class="flex items-center gap-1 px-2 py-1 text-xs border border-slate-300 text-slate-700 rounded hover:bg-slate-100 focus-visible:ring-2 focus-visible:ring-blue-600 focus-visible:ring-offset-2">
                    <i data-lucide="plus" class="w-3 h-3"></i> Add Item
                  </button>
                  <button @click="addInvoiceLine()" class="flex items-center gap-1 px-2 py-1 text-xs bg-blue-600 text-white rounded hover:bg-blue-700 focus-visible:ring-2 focus-visible:ring-blue-600 focus-visible:ring-offset-2">
                    <i data-lucide="plus" class="w-3 h-3"></i> Add Line
                  </button>
                </div>
              </div>
              <table class="w-full text-sm">
                <thead class="bg-slate-50 border-b border-slate-200">
                  <tr>
                    <th class="px-4 py-2 text-left font-medium text-slate-600">Item</th>
                    <th class="px-4 py-2 text-right font-medium text-slate-600 w-20">Qty</th>
                    <th class="px-4 py-2 text-right font-medium text-slate-600 w-24">Rate (₹)</th>
                    <th class="px-4 py-2 text-right font-medium text-slate-600 w-20">Disc %</th>
                    <th class="px-4 py-2 text-right font-medium text-slate-600 w-20">GST %</th>
                    <th class="px-4 py-2 text-right font-medium text-slate-600 w-28">Amount (₹)</th>
                    <th class="px-4 py-2 text-center font-medium text-slate-600 w-8"></th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="(line, idx) in invoiceForm.lines" :key="idx">
                    <tr class="border-b border-slate-100 hover:bg-slate-50">
                      <td class="px-4 py-2">
                        <select x-model="line.itemId" @change="updateLineAmount(idx)" class="w-full px-2 py-1 border border-slate-300 rounded text-xs focus-visible:ring-2 focus-visible:ring-blue-600 focus-visible:ring-offset-2">
                          <option value="">Select...</option>
                          <template x-for="item in items" :key="item.id">
                            <option :value="item.id" x-text="item.name"></option>
                          </template>
                        </select>
                      </td>
                      <td class="px-4 py-2"><input type="number" x-model.number="line.qty" @change="updateLineAmount(idx)" class="w-full px-2 py-1 border border-slate-300 rounded text-right text-xs focus-visible:ring-2 focus-visible:ring-blue-600 focus-visible:ring-offset-2" min="0" step="0.01"></td>
                      <td class="px-4 py-2"><input type="number" x-model.number="line.rate" @change="updateLineAmount(idx)" class="w-full px-2 py-1 border border-slate-300 rounded text-right text-xs focus-visible:ring-2 focus-visible:ring-blue-600 focus-visible:ring-offset-2" min="0" step="0.01"></td>
                      <td class="px-4 py-2"><input type="number" x-model.number="line.discPercent" @change="updateLineAmount(idx)" class="w-full px-2 py-1 border border-slate-300 rounded text-right text-xs focus-visible:ring-2 focus-visible:ring-blue-600 focus-visible:ring-offset-2" min="0" max="100" step="0.1"></td>
                      <td class="px-4 py-2"><input type="number" x-model.number="line.gstPercent" class="w-full px-2 py-1 border border-slate-300 rounded text-right text-xs focus-visible:ring-2 focus-visible:ring-blue-600 focus-visible:ring-offset-2" min="0" step="0.1"></td>
                      <td class="px-4 py-2 text-right text-xs font-medium currency" x-text="formatNumber(line.amount || 0)"></td>
                      <td class="px-4 py-2 text-center"><button @click="removeInvoiceLine(idx)" class="text-red-600 hover:text-red-700 focus-visible:ring-2 focus-visible:ring-blue-600 focus-visible:ring-offset-2"><i data-lucide="trash-2" class="w-4 h-4"></i></button></td>
                    </tr>
                  </template>
                </tbody>

            'FINISHED': 'bg-emerald-100 text-emerald-700'
          };
          return colors[status] || 'bg-slate-100 text-slate-700';
        },

        updateLineAmount(idx) {
          const line = this.invoiceForm.lines[idx];
          const discounted = line.qty * line.rate * (1 - line.discPercent / 100);
          const tax = discounted * (line.gstPercent / 100);
          line.amount = discounted + tax;
          this.calculateInvoiceTotal();
        },

        calculateInvoiceTotal() {
          this.invoiceForm.subtotal = this.invoiceForm.lines.reduce((s, l) => s + (l.qty * l.rate * (1 - l.discPercent / 100)), 0);
          this.invoiceForm.discount = this.invoiceForm.lines.reduce((s, l) => s + (l.qty * l.rate * l.discPercent / 100), 0);
          this.invoiceForm.tax = this.invoiceForm.lines.reduce((s, l) => s + (l.qty * l.rate * (1 - l.discPercent / 100) * l.gstPercent / 100), 0);
          this.invoiceForm.total = this.invoiceForm.subtotal + this.invoiceForm.tax;
        },

        addInvoiceLine() {
          this.invoiceForm.lines.push({ itemId: '', qty: 0, rate: 0, discPercent: 0, gstPercent: 12, amount: 0 });

          this.invoiceForm.lines.splice(idx, 1);
          this.calculateInvoiceTotal();

          const line = this.poForm.lines[idx];
          line.amount = line.qty * line.rate * (1 + line.gstPercent / 100);
          this.calculatePOTotal();
        },

        calculatePOTotal() {
          this.poForm.subtotal = this.poForm.lines.reduce((s, l) => s + (l.qty * l.rate), 0);
          this.poForm.cgst = this.poForm.subtotal * 0.09;
          this.poForm.sgst = this.poForm.subtotal * 0.09;
          this.poForm.tax = this.poForm.cgst + this.poForm.sgst;
          this.poForm.total = this.poForm.subtotal + this.poForm.tax;
        },

        addPOLine() {
          this.poForm.lines.push({ itemId: '', qty: 0, rate: 0, gstPercent: 18, hsn: '', amount: 0 });
        },

        removePOLine(idx) {
          this.poForm.lines.splice(idx, 1);
          this.calculatePOTotal();
        },

        resetPOForm() {
          this.poForm = {
            supplierId: '',
            poDate: new Date().toISOString().split('T')[0],
            deliveryDate: '',
            status: 'DRAFT',
            lines: [{ itemId: '', qty: 0, rate: 0, gstPercent: 18, hsn: '', amount: 0 }],
            subtotal: 0,
            cgst: 0,
            sgst: 0,
            tax: 0,
            total: 0
          };
        },

        savePO() {
          alert('PO saved: PO-' + Math.floor(Math.random() * 10000));
          this.resetPOForm();
        },

        updateVariance(idx) {
          const item = this.stockTake.items[idx];
          item.variance = item.countedQty - item.systemQty;
          if (item.countedQty > 0) item.counted = true;
          this.stockTake.countedItems = this.stockTake.items.filter(i => i.counted).length;
        },

        refreshDashboard() {
          alert('Dashboard refreshed!');
        },

        refreshStock() {
          alert('Stock data refreshed!');
        },

        get filteredKanbanCards() {
          return this.kanbanCards.filter(c => {
            const matchMO = !this.kanbanFilters.moId || c.mo === this.kanbanFilters.moId;
            const matchKarigar = !this.kanbanFilters.karigerId || (c.karigar && c.karigar.includes(this.kanbanFilters.karigerId));
            const matchDesign = !this.kanbanFilters.designId || c.design.includes(this.kanbanFilters.designId);
            return matchMO && matchKarigar && matchDesign;
          });
        },

        kanbanCardColor(card) {
          if (this.kanbanFilters.bottleneckMode) {
            const ratio = card.ageDays / Math.max(card.expectedDays, 1);
            if (ratio <= 1) return 'bg-emerald-50 border-emerald-300';
            if (ratio <= 1.5) return 'bg-amber-50 border-amber-300';
            return 'bg-red-50 border-red-300';
          }
          return 'bg-white';
        },

        ageBadgeColor(ageDays, expectedDays) {
          const ratio = ageDays / Math.max(expectedDays, 1);
          if (ratio <= 1) return 'bg-emerald-100 text-emerald-700';
          if (ratio <= 1.5) return 'bg-amber-100 text-amber-700';
          return 'bg-red-100 text-red-700';
        },

        openKanbanDetail(card) {
          this.kanbanCardDetails = {
            ...card,
            transitions: [
              { stage: card.stage, date: new Date().toISOString().split('T')[0], status: 'current' }
            ]
          };
        },

        refreshKanban() {
          alert('Production pipeline refreshed!');
        },

        getTotalKanbanValue() {
          return this.kanbanCards.reduce((sum, card) => sum + card.value, 0);
        },

        openNewPartyModal(role) {
          this.newPartyForm = {
            name: '',
            phone: '',
            email: '',
            taxStatus: 'REGULAR',
            gstin: '',
            pan: '',
            state: 'GJ',
            address: '',
            roles: { supplier: role === 'supplier', customer: role === 'customer', karigar: false, transporter: false },
            creditLimit: 0,
            creditDays: 30,
            isCustomer: role === 'customer',
            isSupplier: role === 'supplier'
          };
          this.showNewPartyModal = true;
        },

        saveNewParty() {
          if (!this.newPartyForm.name.trim()) {
            alert('Party name required');
            return;
          }
          const newParty = {
            id: 'p' + Math.random().toString(36).substr(2, 9),
            name: this.newPartyForm.name,
            phone: this.newPartyForm.phone,
            email: this.newPartyForm.email,
            taxStatus: this.newPartyForm.taxStatus,
            gstin: this.newPartyForm.gstin,
            pan: this.newPartyForm.pan,
            state: this.newPartyForm.state,
            address: this.newPartyForm.address,
            creditLimit: this.newPartyForm.creditLimit,
            creditDays: this.newPartyForm.creditDays
          };
          if (this.newPartyForm.isCustomer) {
            this.customers.push(newParty);
          }
          if (this.newPartyForm.isSupplier) {
            this.suppliers.push(newParty);
          }
          alert(this.newPartyForm.name + ' added successfully!');
          this.showNewPartyModal = false;
        },

        closeNewPartyModal() {
          this.showNewPartyModal = false;
        },

        openNewItemModal() {
          this.newItemForm = {
            code: '',
            name: '',
            type: 'RAW',
            category: '',
            primaryUom: 'meter',
            hsn: '',
            gstRate: 12,
            tracking: 'NONE',
            hasVariants: false,
            variants: { axes: [] }
          };
          this.showNewItemModal = true;
        },

        saveNewItem() {
          if (!this.newItemForm.name.trim()) {
            alert('Item name required');
            return;
          }
          const newItem = {
            id: 'i' + Math.random().toString(36).substr(2, 9),
            code: this.newItemForm.code,
            name: this.newItemForm.name,
            type: this.newItemForm.type,
            category: this.newItemForm.category,
            primaryUom: this.newItemForm.primaryUom,
            hsn: this.newItemForm.hsn,
            gst: this.newItemForm.gstRate,
            tracking: this.newItemForm.tracking
          };
          this.items.push(newItem);
          alert(this.newItemForm.name + ' added successfully!');
          this.showNewItemModal = false;
        },

        closeNewItemModal() {
          this.showNewItemModal = false;
        },

        validateGSTIN(gstin) {
          return /^[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z]{1}[1-9A-Z]{1}Z[0-9]{1}$/.test(gstin);
        },

        getStateFromGSTIN(gstin) {
          const stateCodes = {
            '01': 'AN', '02': 'AP', '03': 'AR', '04': 'AS', '05': 'BR', '06': 'CG', '07': 'CH', '08': 'CT',
            '09': 'DL', '10': 'DN', '11': 'GA', '12': 'GJ', '13': 'HR', '14': 'HP', '15': 'JK', '16': 'JH',
            '17': 'KA', '18': 'KL', '19': 'LA', '20': 'LD', '21': 'MP', '22': 'MH', '23': 'MN', '24': 'ML',
            '25': 'MZ', '26': 'OD', '27': 'PY', '28': 'PB', '29': 'RJ', '30': 'SK', '31': 'TN', '32': 'TG',
            '33': 'TR', '34': 'UP', '35': 'UT', '36': 'WB'
          };
          return stateCodes[gstin.substring(0, 2)] || 'Unknown';
        }
      };
    }

    document.addEventListener('alpine:init', () => {
      lucide.createIcons();
    });
  </script>
</body>
</html>
