openapi: 3.1.0
info:
  title: Fabric ERP API
  version: 0.1.0-phase1
  description: Multi-tenant SaaS ERP for ladies-suit / fabric trade (Phase 1 scope)
  contact:
    name: Fabric ERP Team
  license:
    name: Proprietary

servers:
  - url: https://api.fabric-erp.com/v1
    description: Production API
  - url: http://localhost:8000/v1
    description: Local development

tags:
  - name: identity
    description: Authentication, users, roles, firms
  - name: masters
    description: Party, Item, SKU, ledgers, price lists, COA
  - name: procurement
    description: Purchase orders, GRN, invoices, returns, landed costs
  - name: inventory
    description: Stock positions, ATP, lots, adjustments, stock-takes, transfers, consignment
  - name: sales
    description: Quotations, sales orders, delivery challans, invoices, returns
  - name: accounting
    description: Vouchers, bank accounts, cheques, expenses, fixed assets, periods
  - name: reports
    description: Day-book, trial balance, P&L, balance sheet, ledger, ageing, stock summary
  - name: platform
    description: Audit log, feature flags, notifications, exports

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /auth/login

  parameters:
    OrgId:
      name: X-Org-Id
      in: header
      required: true
      schema:
        type: string
        format: uuid
      description: Organization UUID (tenant ID)

    FirmId:
      name: X-Firm-Id
      in: header
      required: true
      schema:
        type: string
        format: uuid
      description: Firm UUID within the organization

    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 200
      description: Number of items per page

    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
        nullable: true
      description: Cursor token for pagination

    Filter:
      name: filter
      in: query
      required: false
      schema:
        type: string
      description: Filter query (e.g., status=DRAFT, name~Jane)

    Sort:
      name: sort
      in: query
      required: false
      schema:
        type: string
        default: created_at:desc
      description: Sort field and direction (field:asc|desc)

    Include:
      name: include
      in: query
      required: false
      schema:
        type: string
      description: Comma-separated related resources (e.g., lines, addresses)

    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: |
        Client-supplied key (UUID or opaque up to 100 chars) to make mutating requests
        idempotent. If the same key is retried within 14 days, the server returns the
        original response instead of creating a duplicate. Critical for offline Android
        sync and flaky-network retries.
      schema:
        type: string
        maxLength: 100
        pattern: "^[A-Za-z0-9_-]{8,100}$"

  responses:
    BadRequest:
      description: Bad request
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'

    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'

    Forbidden:
      description: Insufficient permissions
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'

    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'

    Conflict:
      description: Conflict (e.g., duplicate, invalid state)
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'

    InternalServerError:
      description: Internal server error
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'

  schemas:
    ProblemDetails:
      type: object
      required:
        - type
        - status
        - title
      properties:
        type:
          type: string
          format: uri
          description: Problem type URI per RFC 9457
        status:
          type: integer
          description: HTTP status code
        title:
          type: string
          description: Short human-readable title
        detail:
          type: string
          description: Detailed explanation
        instance:
          type: string
          format: uri
          description: URI of the specific problem instance
        errors:
          type: object
          additionalProperties: true
          description: Field-level error details

    PaginatedResponse:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
        next_cursor:
          type: string
          nullable: true
        has_more:
          type: boolean
      required:
        - items
        - has_more

    TaxStatus:
      type: string
      enum:
        - REGULAR
        - COMPOSITION
        - UNREGISTERED
        - CONSUMER
        - OVERSEAS

    VoucherStatus:
      type: string
      enum:
        - DRAFT
        - POSTED
        - RECONCILED
        - VOIDED

    MOStatus:
      type: string
      enum:
        - DRAFT
        - RELEASED
        - IN_PROGRESS
        - COMPLETED
        - CLOSED

    PurchaseOrderStatus:
      type: string
      enum:
        - DRAFT
        - APPROVED
        - CONFIRMED
        - PARTIAL_GRN
        - FULLY_RECEIVED
        - CANCELLED

    SalesOrderStatus:
      type: string
      enum:
        - DRAFT
        - CONFIRMED
        - PARTIAL_DC
        - FULLY_DISPATCHED
        - INVOICED
        - CANCELLED

    QuoteStatus:
      type: string
      enum:
        - DRAFT
        - SENT
        - NEGOTIATING
        - WON
        - LOST
        - EXPIRED
        - CONVERTED

    ChallanStatus:
      type: string
      enum:
        - DRAFT
        - ISSUED
        - ACKNOWLEDGED
        - IN_PROCESS
        - RETURNED
        - CLOSED

    ItemType:
      type: string
      enum:
        - RAW
        - SEMI_FINISHED
        - FINISHED
        - SERVICE
        - CONSUMABLE
        - BY_PRODUCT
        - SCRAP

    TrackingType:
      type: string
      enum:
        - NONE
        - BATCH
        - LOT
        - SERIAL

    PartyType:
      type: string
      enum:
        - SUPPLIER
        - CUSTOMER
        - KARIGAR
        - TRANSPORTER
        - OTHER

    UOMType:
      type: string
      enum:
        - METER
        - PIECE
        - KG
        - LITER
        - SET
        - GROSS
        - DOZEN
        - ROLL
        - BUNDLE
        - OTHER

    VoucherType:
      type: string
      enum:
        - SALES_INVOICE
        - PURCHASE_INVOICE
        - PAYMENT
        - RECEIPT
        - JOURNAL
        - CONTRA
        - DEBIT_NOTE
        - CREDIT_NOTE
        - OPENING_BAL

    PaymentMode:
      type: string
      enum:
        - CASH
        - BANK_TRANSFER
        - CHEQUE
        - UPI
        - CREDIT
        - NEFT
        - RTGS
        - DD
        - CARD

    JournalLineType:
      type: string
      enum:
        - DR
        - CR

    ChequeStatus:
      type: string
      enum:
        - ISSUED
        - CLEARED
        - BOUNCED
        - POST_DATED
        - STOPPED
        - CANCELLED

    Party:
      type: object
      required:
        - name
        - tax_status
      properties:
        party_id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 255
        legal_name:
          type: string
          maxLength: 255
          nullable: true
        tax_status:
          $ref: '#/components/schemas/TaxStatus'
        gstin:
          type: string
          maxLength: 15
          nullable: true
          description: Encrypted in DB; decrypted on retrieval if user has view permission
        pan:
          type: string
          maxLength: 10
          nullable: true
        state_code:
          type: string
          maxLength: 2
        is_supplier:
          type: boolean
          default: false
        is_customer:
          type: boolean
          default: false
        is_karigar:
          type: boolean
          default: false
        is_transporter:
          type: boolean
          default: false
        credit_limit:
          type: number
          format: double
          nullable: true
        credit_days:
          type: integer
          nullable: true
        default_price_list_id:
          type: string
          format: uuid
          nullable: true
        addresses:
          type: array
          items:
            type: object
            description: See party_address table in DDL
        bank_accounts:
          type: array
          items:
            type: object
            description: See party_bank_account table in DDL
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Item:
      type: object
      required:
        - code
        - name
        - item_type
        - primary_uom
      properties:
        item_id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        code:
          type: string
          maxLength: 50
        name:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
        item_type:
          $ref: '#/components/schemas/ItemType'
        category:
          type: string
          maxLength: 100
          nullable: true
        primary_uom:
          $ref: '#/components/schemas/UOMType'
        tracking:
          $ref: '#/components/schemas/TrackingType'
          default: NONE
        hsn_code:
          type: string
          maxLength: 8
          nullable: true
        gst_rate:
          type: number
          format: double
          nullable: true
        skus:
          type: array
          items:
            $ref: '#/components/schemas/SKU'
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SKU:
      type: object
      required:
        - item_id
        - code
      properties:
        sku_id:
          type: string
          format: uuid
        item_id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        code:
          type: string
          maxLength: 100
        variant_map:
          type: object
          additionalProperties: true
          description: "JSON map of variant axes (e.g., {size: M, color: RED})"
        barcode:
          type: string
          nullable: true
        warehouse_code:
          type: string
          nullable: true
        standard_cost:
          type: number
          format: double
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Voucher:
      type: object
      required:
        - voucher_type
        - voucher_date
      properties:
        voucher_id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        firm_id:
          type: string
          format: uuid
        voucher_type:
          $ref: '#/components/schemas/VoucherType'
        voucher_number:
          type: string
          maxLength: 50
          nullable: true
          description: Null until posted
        voucher_date:
          type: string
          format: date
        reference_number:
          type: string
          maxLength: 100
          nullable: true
        reference_date:
          type: string
          format: date
          nullable: true
        party_id:
          type: string
          format: uuid
          nullable: true
        ledger_id:
          type: string
          format: uuid
          nullable: true
        amount:
          type: number
          format: double
        status:
          $ref: '#/components/schemas/VoucherStatus'
          default: DRAFT
        notes:
          type: string
          nullable: true
        lines:
          type: array
          items:
            $ref: '#/components/schemas/VoucherLine'
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    VoucherLine:
      type: object
      required:
        - ledger_id
        - amount
        - line_type
      properties:
        voucher_line_id:
          type: string
          format: uuid
        voucher_id:
          type: string
          format: uuid
        ledger_id:
          type: string
          format: uuid
        line_type:
          $ref: '#/components/schemas/JournalLineType'
        amount:
          type: number
          format: double
        description:
          type: string
          nullable: true
        reference_id:
          type: string
          format: uuid
          nullable: true
          description: Ref to PO, GRN, Invoice, etc.
        cost_centre_id:
          type: string
          format: uuid
          nullable: true

    Invoice:
      type: object
      required:
        - party_id
        - invoice_date
      properties:
        invoice_id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        firm_id:
          type: string
          format: uuid
        invoice_number:
          type: string
          maxLength: 50
          nullable: true
        invoice_date:
          type: string
          format: date
        party_id:
          type: string
          format: uuid
        sales_order_id:
          type: string
          format: uuid
          nullable: true
        delivery_challan_id:
          type: string
          format: uuid
          nullable: true
        tax_regime:
          type: string
          enum:
            - GST
            - NON_GST
        total_amount:
          type: number
          format: double
        tax_amount:
          type: number
          format: double
          nullable: true
        net_amount:
          type: number
          format: double
        status:
          type: string
          enum:
            - DRAFT
            - FINALIZED
            - SENT
          default: DRAFT
        lines:
          type: array
          items:
            $ref: '#/components/schemas/InvoiceLine'
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    InvoiceLine:
      type: object
      required:
        - sku_id
        - quantity
        - unit_rate
      properties:
        invoice_line_id:
          type: string
          format: uuid
        invoice_id:
          type: string
          format: uuid
        sku_id:
          type: string
          format: uuid
        quantity:
          type: number
          format: double
        unit_rate:
          type: number
          format: double
        line_amount:
          type: number
          format: double
        tax_rate:
          type: number
          format: double
          nullable: true
        tax_amount:
          type: number
          format: double
          nullable: true
        description:
          type: string
          nullable: true

    PurchaseInvoice:
      type: object
      required:
        - party_id
        - invoice_date
      properties:
        purchase_invoice_id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        firm_id:
          type: string
          format: uuid
        invoice_number:
          type: string
          maxLength: 50
        invoice_date:
          type: string
          format: date
        party_id:
          type: string
          format: uuid
        purchase_order_id:
          type: string
          format: uuid
          nullable: true
        grn_ids:
          type: array
          items:
            type: string
            format: uuid
        total_amount:
          type: number
          format: double
        tax_amount:
          type: number
          format: double
          nullable: true
        net_amount:
          type: number
          format: double
        status:
          type: string
          enum:
            - DRAFT
            - MATCHED
            - INVOICED
            - PAID
        lines:
          type: array
          items:
            $ref: '#/components/schemas/PurchaseInvoiceLine'
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PurchaseInvoiceLine:
      type: object
      required:
        - item_id
        - quantity
        - unit_rate
      properties:
        purchase_invoice_line_id:
          type: string
          format: uuid
        purchase_invoice_id:
          type: string
          format: uuid
        item_id:
          type: string
          format: uuid
        quantity:
          type: number
          format: double
        unit_rate:
          type: number
          format: double
        line_amount:
          type: number
          format: double
        tax_rate:
          type: number
          format: double
          nullable: true
        tax_amount:
          type: number
          format: double
          nullable: true

    StockPosition:
      type: object
      properties:
        stock_position_id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        firm_id:
          type: string
          format: uuid
        sku_id:
          type: string
          format: uuid
        location_id:
          type: string
          format: uuid
        available_qty:
          type: number
          format: double
        reserved_qty:
          type: number
          format: double
        in_transit_qty:
          type: number
          format: double
        cost_value:
          type: number
          format: double
        valuation_method:
          type: string
          enum:
            - FIFO
            - MOVING_AVERAGE
        updated_at:
          type: string
          format: date-time

    Lot:
      type: object
      required:
        - sku_id
        - lot_number
      properties:
        lot_id:
          type: string
          format: uuid
        org_id:
          type: string
          format: uuid
        firm_id:
          type: string
          format: uuid
        sku_id:
          type: string
          format: uuid
        lot_number:
          type: string
          maxLength: 100
        received_date:
          type: string
          format: date
        supplier_batch:
          type: string
          maxLength: 100
          nullable: true
        attributes:
          type: object
          additionalProperties: true
          description: JSON object for lot-specific data (GSM, width, shade, etc.)
        total_qty:
          type: number
          format: double
        available_qty:
          type: number
          format: double
        standard_cost:
          type: number
          format: double
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

security:
  - bearerAuth: []

paths:
  /auth/login:
    post:
      summary: Login and obtain JWT
      operationId: loginUser
      tags:
        - identity
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  refresh_token:
                    type: string
                  expires_in:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-permission: public

  /auth/refresh:
    post:
      summary: Refresh JWT token
      operationId: refreshToken
      tags:
        - identity
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refresh_token
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  expires_in:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-permission: auth.refresh

  /auth/logout:
    post:
      summary: Logout and revoke token
      operationId: logoutUser
      tags:
        - identity
      responses:
        '204':
          description: Logged out successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-permission: auth.logout

  /auth/mfa/enroll:
    post:
      summary: Enroll in MFA
      operationId: enrollMFA
      tags:
        - identity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                method:
                  type: string
                  enum:
                    - TOTP
                    - SMS
      responses:
        '200':
          description: MFA enrollment initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  secret:
                    type: string
                    description: For TOTP, the secret to scan into authenticator app
                  challenge_id:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
      x-permission: user.mfa.enroll

  /auth/mfa/verify:
    post:
      summary: Verify MFA code
      operationId: verifyMFA
      tags:
        - identity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - challenge_id
                - code
              properties:
                challenge_id:
                  type: string
                code:
                  type: string
      responses:
        '200':
          description: MFA verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  confirmed:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-permission: user.mfa.verify

  /me:
    get:
      summary: Get current user profile
      operationId: getCurrentUser
      tags:
        - identity
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                type: object
                description: User profile with org and firms
        '401':
          $ref: '#/components/responses/Unauthorized'
      x-permission: user.read_self

  /users:
    get:
      summary: List users in organization
      operationId: listUsers
      tags:
        - identity
      parameters:
        - $ref: '#/components/parameters/OrgId'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Filter'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: Paginated user list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          description: See app_user table in DDL
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      x-permission: user.list

    post:
      summary: Create user
      operationId: createUser
      tags:
        - identity
      parameters:
        - $ref: '#/components/parameters/OrgId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - legal_name
              properties:
                email:
                  type: string
                  format: email
                legal_name:
                  type: string
                phone:
                  type: string
                  nullable: true
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
      x-permission: user.create

  /users/{user_id}:
    get:
      summary: Get user by ID
      operationId: getUser
      tags:
        - identity
      parameters:
        - $ref: '#/components/parameters/OrgId'
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                type: object
        '404':
          $ref: '#/components/responses/NotFound'
      x-permission: user.read

    patch:
      summary: Update user
      operationId: updateUser
      tags:
        - identity
      parameters:
        - $ref: '#/components/parameters/OrgId'
        - name: user_id
          in: path
          required: true
