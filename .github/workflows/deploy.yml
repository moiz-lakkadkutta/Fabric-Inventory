name: Deploy

# TASK-CUT-405 — production deploy workflow.
#
# Heritage: derived from the staging deploy workflow parked on
# task/int-0-staging-bootstrap (commit 6611421). Differences:
#   - Tag-triggered (push of `v*` tag) instead of push-to-main. Stops
#     accidental prod deploys from a broken main.
#   - Uses the `production` GitHub environment which requires 1
#     reviewer approval before the deploy job runs. Configured in
#     Settings → Environments → production → "Required reviewers".
#   - Backend image built from backend/Dockerfile.prod (multi-stage,
#     no dev tooling). Frontend image built from
#     frontend/Dockerfile.prod (multi-stage Vite build → nginx:alpine).
#   - IMAGE_TAG pinned to the git tag in the on-box env file so
#     rollback is a deterministic re-deploy.
#   - Migrations run via `compose run --rm migrate` BEFORE the new
#     fastapi image is rolled out (backward-compatible migrations only,
#     per CLAUDE.md).
#   - Smoke test hits /live and /ready post-deploy. Five-attempt retry
#     with 5s spacing absorbs slow boots without masking real failure.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (e.g. v0.1.0). Required for manual runs.'
        required: true
        type: string

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}
  API_IMAGE_NAME: fabric-api
  WEB_IMAGE_NAME: fabric-web

jobs:
  build-api:
    name: Build & push API image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tag
        id: meta
        run: |
          # Tag-push uses the tag name; workflow_dispatch uses the
          # operator-supplied input.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.image_tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.API_IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.API_IMAGE_NAME }}:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

  build-web:
    name: Build & push Web image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.image_tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.WEB_IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.WEB_IMAGE_NAME }}:latest
          build-args: |
            VITE_API_BASE_URL=/api
            VITE_API_MODE=live
            VITE_SENTRY_DSN=${{ secrets.SENTRY_DSN_PROD }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

  deploy:
    name: Deploy to ${{ vars.PROD_DOMAIN || 'app.taana.in' }}
    runs-on: ubuntu-latest
    needs: [build-api, build-web]
    # `production` is a GitHub environment configured with required
    # reviewers — the job pauses for explicit human approval before
    # executing. Configure under Settings → Environments → production →
    # "Required reviewers" (1 reviewer minimum). The deploy runbook
    # documents this setup in § Pre-flight: GitHub secrets.
    environment:
      name: production
      url: https://${{ vars.PROD_DOMAIN || 'app.taana.in' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.PROD_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync compose + ops files to box
        run: |
          rsync -az --delete \
            --include='docker-compose.prod.yml' \
            --include='ops/***' \
            --exclude='*' \
            ./ \
            "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}:/opt/fabric/repo/"

      - name: Pin IMAGE_TAG in on-box env
        env:
          IMAGE_TAG: ${{ needs.build-api.outputs.tag }}
        run: |
          # Ship the tag in via ssh stdin; the remote shell reads it
          # off the first line and exports it. Quoted heredoc means
          # the runner does NOT pre-expand $TAG. Deterministic
          # rollback comes from re-pinning this same value.
          # shellcheck disable=SC2087
          {
            printf 'TAG=%s\n' "$IMAGE_TAG"
            cat <<'REMOTE'
            set -euo pipefail
            sudo sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${TAG}|" /opt/fabric/.env.production
          REMOTE
          } | ssh "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}" bash -s

      - name: Pull images, migrate, restart
        run: |
          ssh "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}" bash -se <<'EOF'
            set -euo pipefail
            cd /opt/fabric/repo
            # ENV_FILE points env_file: entries in compose at the
            # on-box prod env. --env-file does interpolation; ENV_FILE
            # does the env_file: load. Both target the same path.
            export ENV_FILE=/opt/fabric/.env.production
            COMPOSE="docker compose -f docker-compose.prod.yml --env-file /opt/fabric/.env.production"
            $COMPOSE pull
            # Migrate FIRST (backward-compatible — see CLAUDE.md). The
            # migrate service uses `profiles: [migrate]` so plain `up -d`
            # does not start it.
            $COMPOSE --profile migrate run --rm migrate
            $COMPOSE up -d
            docker image prune -f
          EOF

      - name: Smoke test — /live + /ready
        env:
          DOMAIN: ${{ vars.PROD_DOMAIN || 'app.taana.in' }}
        run: |
          for endpoint in /live /ready; do
            ok=0
            for i in 1 2 3 4 5; do
              if curl -fsS --max-time 10 "https://${DOMAIN}${endpoint}" > /tmp/smoke.txt; then
                cat /tmp/smoke.txt
                ok=1
                break
              fi
              echo "Attempt $i on ${endpoint} failed; retrying in 5s..."
              sleep 5
            done
            if [ "$ok" -ne 1 ]; then
              echo "Smoke test failed: ${endpoint} unreachable after 5 attempts." >&2
              exit 1
            fi
          done
          echo "Smoke test passed: /live and /ready both 200."
