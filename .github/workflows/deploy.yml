name: Deploy

# Plan: docs/plans/integration-plan.md → T-INT-0.
#
# Fires on every push to main. Builds two images (api + web), pushes to GHCR,
# SSHes to the Hetzner CX22 box, and runs `docker compose pull && up -d`,
# then `alembic upgrade head` as a one-shot job.
#
# Production (`app.taana.in`) intentionally NOT wired up here. That comes
# after PR-INT-5 + 1-week soak (Q10a). For now, every main-push goes
# straight to staging.taana.in. Roll back by reverting the merge commit and
# pushing again — image tags follow the commit SHA.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}
  API_IMAGE_NAME: fabric-api
  WEB_IMAGE_NAME: fabric-web

jobs:
  build-api:
    name: Build & push API image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: |
          echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.API_IMAGE_NAME }}:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.API_IMAGE_NAME }}:latest" >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.dev
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

  build-web:
    name: Build & push Web image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: |
          echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.WEB_IMAGE_NAME }}:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.WEB_IMAGE_NAME }}:latest" >> "$GITHUB_OUTPUT"

      # The web image needs a multi-stage Dockerfile (Vite build → nginx).
      # That Dockerfile lands alongside this workflow in T-INT-0 follow-up
      # once Moiz has set the GHCR + SSH secrets and confirmed the box is up.
      - name: Build & push
        if: hashFiles('frontend/Dockerfile.staging') != ''
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.staging
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VITE_API_BASE_URL=https://staging.taana.in/api
            VITE_API_MODE=mock
            VITE_SENTRY_DSN=${{ secrets.SENTRY_DSN_STAGING }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

      - name: Skip note (no Dockerfile.staging yet)
        if: hashFiles('frontend/Dockerfile.staging') == ''
        run: |
          echo "frontend/Dockerfile.staging not present yet — web build skipped."
          echo "Add it before T-INT-1 lands so staging serves the real bundle."

  deploy:
    name: Deploy to staging.taana.in
    runs-on: ubuntu-latest
    needs: [build-api, build-web]
    # Only deploy if the SSH secret is configured. Lets the workflow remain
    # green on first runs before Moiz has populated repo secrets.
    if: ${{ vars.STAGING_DEPLOY_ENABLED == 'true' }}
    environment:
      name: staging
      url: https://staging.taana.in
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.STAGING_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync compose + ops files to box
        run: |
          rsync -az --delete \
            --include='docker-compose.staging.yml' \
            --include='ops/***' \
            --exclude='*' \
            ./ \
            "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}:/opt/fabric/repo/"

      - name: Pull images, run migrations, restart
        run: |
          ssh "${{ secrets.STAGING_SSH_USER }}@${{ secrets.STAGING_SSH_HOST }}" bash -se <<'EOF'
            set -euo pipefail
            cd /opt/fabric
            docker compose -f docker-compose.staging.yml --env-file /opt/fabric/.env.staging pull
            docker compose -f docker-compose.staging.yml --env-file /opt/fabric/.env.staging \
              run --rm fastapi uv run alembic upgrade head
            docker compose -f docker-compose.staging.yml --env-file /opt/fabric/.env.staging up -d
            docker image prune -f
          EOF

      - name: Smoke test
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsS https://staging.taana.in/api/v1/health; then
              echo "OK"
              exit 0
            fi
            echo "Attempt $i failed; retrying in 5s..."
            sleep 5
          done
          echo "Health check failed after 5 attempts." >&2
          exit 1
