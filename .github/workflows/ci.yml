name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

# Cancel in-flight runs on the same branch when a new push lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: Backend lint (ruff + mypy)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install backend deps
        working-directory: backend
        run: uv sync --frozen

      - name: ruff check
        working-directory: backend
        run: uv run ruff check .

      - name: ruff format --check
        working-directory: backend
        run: uv run ruff format --check .

      - name: mypy
        working-directory: backend
        # Match what `make lint` runs locally (`mypy .`, not `mypy app/`) so
        # the CI signal can't drift from the dev signal. Pre-TASK-002 there's
        # still main.py + tests/ to check, and once TASK-002 lands `app/` is
        # picked up automatically. Strictness is configured in pyproject.toml.
        run: uv run mypy .

  backend-test:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        # The idempotency middleware degrades to "presence-only" when
        # REDIS_URL is unset (see `backend/app/middleware/idempotency.py`).
        # Without Redis in CI, replay-equality tests like
        # `test_journal_voucher_idempotency_returns_cached` silently fail
        # because the second POST allocates a new voucher_id instead of
        # returning the cached one.
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # CI=true is set by GitHub Actions automatically; restated here for clarity.
      # Tests use this to fail-loud instead of skip when Postgres is unreachable.
      #
      # Per TASK-INT-16, the runtime DATABASE_URL connects as `fabric_app`
      # (NOBYPASSRLS) so RLS is enforced — superuser would silently bypass
      # every policy. The role is created by the INT-9 migration; alembic
      # itself runs under the postgres superuser via MIGRATION_DATABASE_URL.
      DATABASE_URL: postgresql+asyncpg://fabric_app:fabric_app_dev@localhost:5432/test
      MIGRATION_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test
      REDIS_URL: redis://localhost:6379/0
      # TASK-TR-SEC1 review fix (B3 + M5): the app + alembic refuse to boot
      # in any ENVIRONMENT outside {dev, test} without PII_MASTER_KEY.
      # `dev` is in both that allowlist AND `Settings.environment`'s Literal
      # (`Literal["dev", "staging", "prod"]`), so the public KEK fallback
      # fires (with a loud WARNING log) and Settings validates cleanly.
      # Prod / staging set both ENVIRONMENT and PII_MASTER_KEY in their
      # secret store.
      ENVIRONMENT: dev

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install WeasyPrint runtime libs (Pango/Cairo/HarfBuzz/Noto)
        # CUT-205 — pdf_service uses WeasyPrint, which dlopen()s these libs at
        # render time. CI runs the integration test that hits the PDF route, so
        # pytest must have them loadable. Mirrors backend/Dockerfile.dev.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 \
            libpangoft2-1.0-0 \
            libharfbuzz-subset0 \
            libcairo2 \
            fonts-noto \
            fonts-noto-cjk

      - name: Install backend deps
        working-directory: backend
        run: uv sync --frozen

      - name: Run migrations (alembic upgrade head)
        working-directory: backend
        # Round-trip tests (TASK-006+) and the migration smoke test expect a
        # migrated schema. Skip cleanly while alembic itself isn't yet present.
        run: |
          if [ -f alembic.ini ]; then
            uv run alembic upgrade head
          else
            echo "alembic.ini not present yet — skipping migration step until TASK-004 lands."
          fi

      - name: Detect tests, then run pytest
        working-directory: backend
        # If `tests/` is empty, pytest --collect-only exits with rc=5
        # ("no tests collected"). Treat that as a green skip so an empty backend
        # doesn't fail before TASK-002/TASK-006 land tests.
        run: |
          set +e
          uv run pytest --collect-only -q
          collect_rc=$?
          set -e
          if [ "$collect_rc" -eq 5 ]; then
            echo "No tests collected — skipping pytest run."
            exit 0
          fi
          if [ "$collect_rc" -ne 0 ]; then
            echo "pytest --collect-only failed with rc=$collect_rc"
            exit "$collect_rc"
          fi
          uv run pytest -x --tb=short

  frontend-lint:
    name: Frontend lint (eslint + prettier + tsc)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: ESLint + Prettier
        working-directory: frontend
        run: pnpm lint

      - name: TypeScript typecheck
        working-directory: frontend
        run: pnpm tsc --noEmit

  frontend-test:
    name: Frontend tests (vitest)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Vitest (one-shot)
        working-directory: frontend
        # `pnpm test` is `vitest run --passWithNoTests` (see package.json),
        # so an empty test tree is green. Playwright (E2E) is intentionally
        # NOT gated here — slow + browser download. Add a separate workflow
        # (e.g. `e2e.yml`) when we want it on CI.
        run: pnpm test

  openapi-drift:
    name: OpenAPI codegen drift (BE schema ↔ FE types)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    # Two layers of drift detection (see CUT-106):
    #
    #   1. BE → snapshot drift: re-dump the FastAPI app's openapi schema,
    #      diff against the committed `frontend/scripts/openapi-snapshot.json`.
    #      Fails when someone added/changed a BE schema and forgot to run
    #      `make openapi-snapshot` (or equivalent) to refresh the snapshot.
    #
    #   2. snapshot → codegen drift: regenerate `frontend/src/types/api.ts`
    #      from the snapshot, diff against the committed file. Fails when
    #      someone refreshed the snapshot but forgot to re-run
    #      `pnpm gen:types`.
    #
    # No live backend, no DB, no Redis — the dump script imports the
    # FastAPI app in-process and only needs Settings env vars.
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install backend deps (for the dump script)
        working-directory: backend
        run: uv sync --frozen

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Re-dump openapi snapshot from FastAPI app
        # The dump script runs from any CWD (it walks up to find the repo
        # root). We invoke it via uv from the backend dir so deps resolve.
        working-directory: backend
        run: uv run python ../frontend/scripts/dump-openapi.py --out /tmp/openapi-fresh.json

      - name: Diff snapshot against committed file
        run: |
          if ! diff -q frontend/scripts/openapi-snapshot.json /tmp/openapi-fresh.json; then
            echo "::error::Backend OpenAPI schema has drifted from frontend/scripts/openapi-snapshot.json."
            echo "::error::Run 'cd backend && uv run python ../frontend/scripts/dump-openapi.py' to refresh, then 'cd frontend && pnpm gen:types', and commit both."
            diff frontend/scripts/openapi-snapshot.json /tmp/openapi-fresh.json | head -80 || true
            exit 1
          fi
          echo "OK: snapshot matches BE in-process schema."

      - name: Diff codegen output against committed api.ts
        working-directory: frontend
        # `pnpm check:types` regenerates from the snapshot to /tmp and
        # diffs vs the committed src/types/api.ts. Fails if developer
        # refreshed the snapshot but forgot `pnpm gen:types`.
        run: pnpm check:types

  prod-docker-smoke:
    name: Prod Dockerfile smoke build (BE + FE)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    # CUT-501c — catches regressions in the production Dockerfiles before
    # they break a tag-triggered deploy. We don't push the images; we
    # only build them to confirm the multi-stage flow still resolves
    # (uv sync --no-dev, apt deps, pnpm install --frozen-lockfile,
    # `vite build` with tsc --noEmit). Each build is independent so a
    # break in one is isolated and easy to diagnose.
    #
    # Build cache via docker/build-push-action's gha cache backend keeps
    # subsequent runs fast (~30s when cached).
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Smoke build backend/Dockerfile.prod
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile.prod
          push: false
          load: false
          cache-from: type=gha,scope=prod-be
          cache-to: type=gha,mode=max,scope=prod-be

      - name: Smoke build frontend/Dockerfile.prod
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile.prod
          push: false
          load: false
          cache-from: type=gha,scope=prod-fe
          cache-to: type=gha,mode=max,scope=prod-fe

  e2e-acceptance:
    name: E2E acceptance (Playwright + docker-compose, CUT-503)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    # TASK-CUT-503 — the wave 1-5 cutover scenario as one continuous
    # journey against a real docker-compose stack. We boot Postgres +
    # Redis + uvicorn + Vite via `docker compose up -d`, wait for the
    # api `/ready` probe and the Vite dev server, then run the single
    # `cutover.spec.ts` with `E2E_NO_WEBSERVER=1` so Playwright doesn't
    # try to start a second Vite on the port we just bound.
    #
    # Runs on every push and PR. Path-based filtering is left to the
    # workflow's `on:` block at the top of this file (which is already
    # `branches: ['**']` for both `push` and `pull_request`). If the
    # solo-reviewer cost of running e2e on every event grows, switch
    # to `dorny/paths-filter` and gate by `frontend/**`, `backend/**`,
    # `frontend/__tests__/e2e/**`, `docker-compose.yml`, this workflow.
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers (chromium only)
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium

      - name: Create stack .env files
        # docker-compose.yml reads from `.env`; the frontend container
        # reads its own .env via Vite (already wired via compose env vars).
        run: |
          test -f .env || cp .env.example .env
          test -f backend/.env || cp backend/.env.example backend/.env
          test -f frontend/.env || cp frontend/.env.example frontend/.env

      - name: Boot docker-compose stack (Postgres + Redis + API + Web)
        run: docker compose up -d --build

      - name: Wait for backend /ready
        # Up to 5 min — alembic migrations run on first boot.
        timeout-minutes: 5
        run: |
          for attempt in $(seq 1 60); do
            if curl -sf http://localhost:8000/ready >/dev/null; then
              echo "Backend ready after $attempt attempt(s)."
              exit 0
            fi
            echo "Waiting for backend /ready (attempt $attempt)…"
            sleep 5
          done
          echo "::error::Backend never reached /ready"
          docker compose logs api | tail -200
          exit 1

      - name: Wait for Vite dev server
        timeout-minutes: 3
        run: |
          for attempt in $(seq 1 36); do
            if curl -sf http://localhost:5173/ >/dev/null; then
              echo "Vite ready after $attempt attempt(s)."
              exit 0
            fi
            echo "Waiting for Vite (attempt $attempt)…"
            sleep 5
          done
          echo "::error::Vite never came up"
          docker compose logs web | tail -200
          exit 1

      - name: Run Playwright acceptance suite (cutover.spec.ts)
        working-directory: frontend
        env:
          E2E_NO_WEBSERVER: "1"
          E2E_RUN_CUTOVER: "1"
          PLAYWRIGHT_BASE_URL: http://localhost:5173
          CI: "true"
        run: pnpm exec playwright test cutover.spec.ts

      # TASK-TR-A13 — manufacturing pipeline acceptance. API-driven E2E
      # against the same docker-compose stack we just used above (signup
      # mints a fresh tenant, so this spec can't collide with the
      # cutover org). Run as a second invocation so the two suites
      # have separate Playwright reports + traces on failure.
      - name: Run Playwright manufacturing pipeline (manufacturing-pipeline.spec.ts)
        working-directory: frontend
        env:
          E2E_NO_WEBSERVER: "1"
          E2E_RUN_CUTOVER: "1"
          PLAYWRIGHT_BASE_URL: http://localhost:5173
          CI: "true"
        run: pnpm exec playwright test manufacturing-pipeline.spec.ts

      - name: Dump docker logs on failure
        if: failure()
        run: |
          echo "===== api logs (tail 400) =====" && docker compose logs api | tail -400 || true
          echo "===== web logs (tail 200) =====" && docker compose logs web | tail -200 || true
          echo "===== postgres logs (tail 100) =====" && docker compose logs postgres | tail -100 || true

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: frontend/test-results
          retention-days: 14
          if-no-files-found: ignore

      - name: Tear down docker-compose stack
        if: always()
        run: docker compose down -v
